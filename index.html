<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tickbox — Playful checklists by ToolWizHub</title>
  <meta name="description" content="Tickbox is a free, no-signup checklist tool by ToolWizHub. Make lists, check things off, watch the confetti fly. Everything saves in your browser." />

  <!-- Open Graph -->
  <meta property="og:title" content="Tickbox — Playful checklists by ToolWizHub" />
  <meta property="og:description" content="Make lists, check things off, watch the confetti fly. Free, no account, saved in your browser." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tickbox.toolwizhub.com" />
  <meta property="og:image" content="https://tickbox.toolwizhub.com/assets/logo-full.webp" />
  <meta property="og:site_name" content="ToolWizHub" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Tickbox — Playful checklists by ToolWizHub" />
  <meta name="twitter:description" content="Make lists, check things off, watch the confetti fly. Free, no account, saved in your browser." />
  <meta name="twitter:image" content="https://tickbox.toolwizhub.com/assets/logo-full.webp" />

  <meta name="theme-color" content="#eefafa" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://tickbox.toolwizhub.com/" />

  <!-- Structured data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Tickbox",
      "url": "https://tickbox.toolwizhub.com/",
      "description": "Free, no-signup checklist tool. Make lists, check things off, watch the confetti fly. Saved in your browser.",
      "applicationCategory": "Productivity",
      "operatingSystem": "Web browser",
      "browserRequirements": "Requires JavaScript",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "publisher": { "@type": "Organization", "name": "ToolWizHub", "url": "https://toolwizhub.com" }
    }
  </script>

  <link rel="icon" type="image/webp" href="assets/favicon.webp" />
  <link rel="apple-touch-icon" href="assets/logo-icon.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    // Skip the splash (no flash) if it already played this tab session.
    try { if (sessionStorage.getItem("tickbox:splashed")) document.documentElement.classList.add("no-splash"); } catch (e) {}
  </script>
</head>
<body>
  <!-- ░░░ Splash screen (covers the app until JS dismisses it) ░░░ -->
  <div class="splash" id="splash" aria-hidden="true">
    <div class="splash__stage">
      <div class="splash__glow"></div>
      <div class="splash__sparkles"><span></span><span></span><span></span><span></span><span></span><span></span></div>
      <img class="splash__logo" src="assets/logo-full.webp" alt="ToolWizHub Tickbox" width="200" height="200" />
      <div class="splash__tagline">Tickbox</div>
      <div class="splash__bar"><span></span></div>
    </div>
  </div>

  <!-- Confetti canvas overlays everything -->
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>

  <div class="app" id="app">
    <!-- ░░░ Sidebar ░░░ -->
    <aside class="sidebar" id="sidebar">
      <header class="sidebar__head">
        <a class="brand" href="https://toolwizhub.com" aria-label="ToolWizHub Tickbox">
          <img class="brand__mark" src="assets/logo-icon.webp" alt="ToolWizHub" width="42" height="42" />
          <span class="brand__text">
            <strong>ToolWizHub</strong>
            <span>Tickbox</span>
          </span>
        </a>
        <button class="icon-btn sidebar__close" id="sidebar-close" title="Close menu" aria-label="Close menu">✕</button>
      </header>

      <button class="btn btn--primary btn--block" id="add-list-btn">
        <span class="btn__plus">＋</span> New list
      </button>

      <nav class="lists" id="lists" aria-label="Your lists"></nav>

      <div class="sidebar__foot">
        <button class="link-btn" id="templates-btn">✨ Start from a template</button>
        <p class="sidebar__note">Saved in this browser. No account, ever.</p>
      </div>
    </aside>

    <!-- ░░░ Main ░░░ -->
    <main class="main" id="main">
      <div class="topbar">
        <button class="icon-btn topbar__menu" id="menu-btn" title="Lists" aria-label="Open lists">☰</button>
        <div class="topbar__title" id="topbar-title">Tickbox</div>
        <div class="topbar__actions" id="list-actions" hidden>
          <button class="icon-btn" id="share-btn" title="Share this list" aria-label="Share list">🔗</button>
          <button class="icon-btn" id="export-btn" title="Copy as Markdown" aria-label="Copy as Markdown">📋</button>
          <button class="icon-btn" id="rename-btn" title="Rename list" aria-label="Rename list">✏️</button>
          <button class="icon-btn icon-btn--danger" id="delete-list-btn" title="Delete list" aria-label="Delete list">🗑️</button>
        </div>
      </div>

      <section class="board" id="board"><!-- list view or empty state injected here --></section>

      <footer class="app-footer">
        <a class="app-footer__brand" href="https://toolwizhub.com" target="_blank" rel="noopener" title="More free tools at ToolWizHub">
          <span class="app-footer__label">More free tools at</span>
          <img src="assets/logo-horizontal.webp" alt="ToolWizHub" />
        </a>
      </footer>
    </main>
  </div>

  <!-- ░░░ Template picker ░░░ -->
  <div class="modal" id="template-modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card" role="dialog" aria-modal="true" aria-label="Pick a template">
      <header class="modal__head">
        <h2>✨ Start from a template</h2>
        <button class="icon-btn" data-close aria-label="Close">✕</button>
      </header>
      <div class="template-grid" id="template-grid"></div>
    </div>
  </div>

  <!-- ░░░ Share dialog ░░░ -->
  <div class="modal" id="share-modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card modal__card--narrow" role="dialog" aria-modal="true" aria-label="Share this list">
      <header class="modal__head">
        <h2>🔗 Share this list</h2>
        <button class="icon-btn" data-close aria-label="Close">✕</button>
      </header>
      <p class="modal__text">Anyone with this link gets their own copy. The whole list lives in the link — nothing is sent to a server.</p>
      <div class="share-row">
        <input type="text" id="share-url" class="input" readonly />
        <button class="btn btn--primary" id="copy-share-btn">Copy</button>
      </div>
      <div class="modal__brand">
        <img src="assets/logo-horizontal.webp" alt="ToolWizHub" />
      </div>
    </div>
  </div>

  <!-- ░░░ Toast ░░░ -->
  <div class="toast" id="toast" hidden></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
